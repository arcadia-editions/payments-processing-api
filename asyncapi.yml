asyncapi: 3.0.0
id: urn:com.arcadiaeditions:payments:processing:asyncapi
info:
  title: "Arcadia Editions - Payments Processing"
  version: 0.0.1
  tags:
    - name: "Default"
    - name: "PaymentsProcessing"

defaultContentType: application/json

channels:
  payment-failed-event-v1:
    address: "payments-processing.payment-failed.event.avro.v1"
    messages:
      RetryPaymentInputMessage:
        $ref: '#/components/messages/RetryPaymentInputMessage'
      PaymentFailedMessage:
        $ref: '#/components/messages/PaymentFailedMessage'
  payment-capture-failed-event-v1:
    address: "payments-processing.payment-capture-failed.event.avro.v1"
    messages:
      VoidPaymentInputMessage:
        $ref: '#/components/messages/VoidPaymentInputMessage'
      PaymentCaptureFailedMessage:
        $ref: '#/components/messages/PaymentCaptureFailedMessage'
  payment-authorized-event-v1:
    address: "payments-processing.payment-authorized.event.avro.v1"
    messages:
      PaymentAuthorizedMessage:
        $ref: '#/components/messages/PaymentAuthorizedMessage'
  payment-declined-event-v1:
    address: "payments-processing.payment-declined.event.avro.v1"
    messages:
      PaymentDeclinedMessage:
        $ref: '#/components/messages/PaymentDeclinedMessage'
  payment-retried-event-v1:
    address: "payments-processing.payment-retried.event.avro.v1"
    messages:
      PaymentRetriedMessage:
        $ref: '#/components/messages/PaymentRetriedMessage'
  payment-retry-exhausted-event-v1:
    address: "payments-processing.payment-retry-exhausted.event.avro.v1"
    messages:
      PaymentRetryExhaustedMessage:
        $ref: '#/components/messages/PaymentRetryExhaustedMessage'
  payment-captured-event-v1:
    address: "payments-processing.payment-captured.event.avro.v1"
    messages:
      PaymentCapturedMessage:
        $ref: '#/components/messages/PaymentCapturedMessage'
  payment-voided-event-v1:
    address: "payments-processing.payment-voided.event.avro.v1"
    messages:
      PaymentVoidedMessage:
        $ref: '#/components/messages/PaymentVoidedMessage'

operations:
  doRetryPayment:
    action: receive
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-failed-event-v1'
  doVoidPayment:
    action: receive
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-capture-failed-event-v1'
  onPaymentAuthorized:
    action: send
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-authorized-event-v1'
  onPaymentDeclined:
    action: send
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-declined-event-v1'
  onPaymentFailed:
    action: send
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-failed-event-v1'
  onPaymentRetried:
    action: send
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-retried-event-v1'
  onPaymentRetryExhausted:
    action: send
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-retry-exhausted-event-v1'
  onPaymentCaptured:
    action: send
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-captured-event-v1'
  onPaymentCaptureFailed:
    action: send
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-capture-failed-event-v1'
  onPaymentVoided:
    action: send
    tags:
      - name: PaymentsProcessing
    channel:
      $ref: '#/channels/payment-voided-event-v1'


components:
  messages:
    RetryPaymentInputMessage:
      name: RetryPaymentInputMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/RetryPaymentInput.avsc"
    VoidPaymentInputMessage:
      name: VoidPaymentInputMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/VoidPaymentInput.avsc"
    PaymentAuthorizedMessage:
      name: PaymentAuthorizedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/PaymentAuthorized.avsc"
    PaymentDeclinedMessage:
      name: PaymentDeclinedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/PaymentDeclined.avsc"
    PaymentFailedMessage:
      name: PaymentFailedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/PaymentFailed.avsc"
    PaymentRetriedMessage:
      name: PaymentRetriedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/PaymentRetried.avsc"
    PaymentRetryExhaustedMessage:
      name: PaymentRetryExhaustedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/PaymentRetryExhausted.avsc"
    PaymentCapturedMessage:
      name: PaymentCapturedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/PaymentCaptured.avsc"
    PaymentCaptureFailedMessage:
      name: PaymentCaptureFailedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/PaymentCaptureFailed.avsc"
    PaymentVoidedMessage:
      name: PaymentVoidedMessage
      title: ""
      summary: ""
      traits:
        - $ref: '#/components/messageTraits/CommonHeaders'
      payload:
        schemaFormat: application/vnd.apache.avro+json;version=1.9.0
        schema:
          $ref: "avro/PaymentVoided.avsc"

  messageTraits:
    CommonHeaders:
      headers:
        type: object
        properties:
          kafka_messageKey:
            type: "integer"
            format: "int64"
            description: This header value will be populated automatically at runtime
            x-runtime-expression: $message.payload#/id
          # CloudEvents Attributes
          ce-id:
            type: string
            description: Unique identifier for the event
            x-runtime-expression: $message.payload#{#this.id}
          ce-source:
            type: string
            description: URI identifying the context where event happened
            x-runtime-expression: $message.payload#{"PaymentsProcessing"}
          ce-specversion:
            type: string
            description: CloudEvents specification version
            x-runtime-expression: $message.payload#{"1.0"}
          ce-type:
            type: string
            description: Event type
            x-runtime-expression: $message.payload#{#this.getClass().getSimpleName()}
          ce-time:
            type: string
            description: Timestamp of when the event happened
            x-runtime-expression: $message.payload#{T(java.time.Instant).now().toString()}

